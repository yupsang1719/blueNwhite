<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0f1e"/>
      <stop offset="100%" style="stop-color:#0d1b3e"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#fbbf24"/>
    </linearGradient>
    <linearGradient id="blueAccent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="20" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Soft blue glow left -->
  <ellipse cx="200" cy="315" rx="300" ry="250" fill="#2563eb" opacity="0.07"/>
  <!-- Soft amber glow right -->
  <ellipse cx="1050" cy="200" rx="250" ry="200" fill="#f59e0b" opacity="0.08"/>

  <!-- Honeycomb grid (top-right decorative) -->
  <!-- Row 1 -->
  <polygon points="980,40 1010,57 1010,91 980,108 950,91 950,57" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.15"/>
  <polygon points="1040,40 1070,57 1070,91 1040,108 1010,91 1010,57" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.15"/>
  <polygon points="1100,40 1130,57 1130,91 1100,108 1070,91 1070,57" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.1"/>
  <polygon points="1160,40 1190,57 1190,91 1160,108 1130,91 1130,57" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.08"/>
  <!-- Row 2 -->
  <polygon points="950,108 980,125 980,159 950,176 920,159 920,125" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.12"/>
  <polygon points="1010,108 1040,125 1040,159 1010,176 980,159 980,125" fill="#f59e0b" stroke="#f59e0b" stroke-width="1" opacity="0.06"/>
  <polygon points="1070,108 1100,125 1100,159 1070,176 1040,159 1040,125" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.12"/>
  <polygon points="1130,108 1160,125 1160,159 1130,176 1100,159 1100,125" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.08"/>
  <!-- Row 3 -->
  <polygon points="980,176 1010,193 1010,227 980,244 950,227 950,193" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.1"/>
  <polygon points="1040,176 1070,193 1070,227 1040,244 1010,227 1010,193" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.15"/>
  <polygon points="1100,176 1130,193 1130,227 1100,244 1070,227 1070,193" fill="#f59e0b" stroke="#f59e0b" stroke-width="1" opacity="0.05"/>
  <!-- Row 4 -->
  <polygon points="950,244 980,261 980,295 950,312 920,295 920,261" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.08"/>
  <polygon points="1010,244 1040,261 1040,295 1010,312 980,295 980,261" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.1"/>
  <polygon points="1070,244 1100,261 1100,295 1070,312 1040,295 1040,261" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.12"/>

  <!-- Bee icon (centered-left, large) -->
  <g transform="translate(130, 245)" filter="url(#glow)">
    <!-- Body -->
    <ellipse cx="60" cy="70" rx="22" ry="32" fill="#f59e0b"/>
    <!-- Stripes -->
    <rect x="38" y="60" width="44" height="8" fill="#1a1a2e" rx="2"/>
    <rect x="38" y="76" width="44" height="8" fill="#1a1a2e" rx="2"/>
    <!-- Head -->
    <circle cx="60" cy="32" r="18" fill="#f59e0b"/>
    <!-- Eyes -->
    <circle cx="53" cy="28" r="4" fill="#1a1a2e"/>
    <circle cx="67" cy="28" r="4" fill="#1a1a2e"/>
    <circle cx="54" cy="27" r="1.5" fill="white"/>
    <circle cx="68" cy="27" r="1.5" fill="white"/>
    <!-- Antennae -->
    <line x1="52" y1="16" x2="40" y2="4" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="68" y1="16" x2="80" y2="4" stroke="#f59e0b" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="40" cy="4" r="3.5" fill="#fbbf24"/>
    <circle cx="80" cy="4" r="3.5" fill="#fbbf24"/>
    <!-- Wings -->
    <ellipse cx="28" cy="52" rx="26" ry="14" fill="#93c5fd" opacity="0.5" transform="rotate(-20, 28, 52)"/>
    <ellipse cx="92" cy="52" rx="26" ry="14" fill="#93c5fd" opacity="0.5" transform="rotate(20, 92, 52)"/>
    <ellipse cx="24" cy="68" rx="20" ry="10" fill="#bfdbfe" opacity="0.35" transform="rotate(-10, 24, 68)"/>
    <ellipse cx="96" cy="68" rx="20" ry="10" fill="#bfdbfe" opacity="0.35" transform="rotate(10, 96, 68)"/>
    <!-- Stinger -->
    <polygon points="50,102 70,102 60,118" fill="#d97706"/>
  </g>

  <!-- Divider line (amber) -->
  <rect x="80" y="430" width="180" height="3" rx="2" fill="url(#accent)" opacity="0.8"/>

  <!-- Main tagline "BEE IN IT" -->
  <text x="80" y="330" font-family="Georgia, serif" font-size="112" font-weight="bold" fill="white" letter-spacing="-2" opacity="0.97">BEE</text>
  <text x="80" y="420" font-family="Georgia, serif" font-size="112" font-weight="bold" fill="url(#accent)" letter-spacing="-2">IN IT</text>

  <!-- Name -->
  <text x="80" y="490" font-family="Arial, sans-serif" font-size="32" font-weight="600" fill="white" opacity="0.9" letter-spacing="2">BIRASH THING</text>

  <!-- Role pill -->
  <rect x="78" y="510" width="340" height="44" rx="22" fill="#2563eb" opacity="0.25" stroke="#3b82f6" stroke-width="1"/>
  <text x="248" y="538" font-family="Arial, sans-serif" font-size="20" fill="#93c5fd" text-anchor="middle" letter-spacing="1">Full-Stack MERN Developer</text>

  <!-- Right side: tech stack dots -->
  <g transform="translate(700, 200)">
    <!-- MongoDB -->
    <circle cx="0" cy="0" r="38" fill="#001e2b" stroke="#00ed64" stroke-width="1.5" opacity="0.7"/>
    <text x="0" y="6" font-family="Arial, sans-serif" font-size="13" fill="#00ed64" text-anchor="middle" font-weight="bold">Mongo</text>
    <!-- Express -->
    <circle cx="120" cy="40" r="38" fill="#1a1a2e" stroke="#888" stroke-width="1.5" opacity="0.7"/>
    <text x="120" y="46" font-family="Arial, sans-serif" font-size="13" fill="#ccc" text-anchor="middle" font-weight="bold">Express</text>
    <!-- React -->
    <circle cx="60" cy="120" r="38" fill="#0d2137" stroke="#61dafb" stroke-width="1.5" opacity="0.7"/>
    <text x="60" y="126" font-family="Arial, sans-serif" font-size="13" fill="#61dafb" text-anchor="middle" font-weight="bold">React</text>
    <!-- Node -->
    <circle cx="180" cy="120" r="38" fill="#0f2a1a" stroke="#68a063" stroke-width="1.5" opacity="0.7"/>
    <text x="180" y="126" font-family="Arial, sans-serif" font-size="13" fill="#68a063" text-anchor="middle" font-weight="bold">Node.js</text>
    <!-- Connecting lines -->
    <line x1="0" y1="38" x2="60" y2="82" stroke="white" stroke-width="0.5" opacity="0.15"/>
    <line x1="120" y1="78" x2="60" y2="82" stroke="white" stroke-width="0.5" opacity="0.15"/>
    <line x1="60" y1="82" x2="180" y2="82" stroke="white" stroke-width="0.5" opacity="0.15"/>
    <line x1="120" y1="38" x2="180" y2="82" stroke="white" stroke-width="0.5" opacity="0.15"/>
  </g>

  <!-- URL bottom right -->
  <text x="1120" y="600" font-family="Arial, sans-serif" font-size="22" fill="#6b7280" text-anchor="end" letter-spacing="1">bluenwhite.co.uk</text>

  <!-- Bottom border accent -->
  <rect x="0" y="618" width="1200" height="4" fill="url(#accent)" opacity="0.6"/>
  <rect x="0" y="622" width="1200" height="2" fill="url(#blueAccent)" opacity="0.4"/>
</svg>
